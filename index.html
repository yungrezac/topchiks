<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топ-3 Дарителя - OBS Widget</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            /* Полностью прозрачный фон для OBS */
            background: transparent !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 20px;
        }
        .glass-panel {
            /* Темная полупрозрачная подложка, чтобы текст не сливался с игрой/видео */
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
        }
        .gifter-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Анимация появления */
        @keyframes popIn {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .animate-pop { animation: popIn 0.5s ease-out forwards; }
        
        /* Особое пульсирующее свечение для Топ 1 */
        @keyframes goldGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); }
            50% { box-shadow: 0 0 40px rgba(250, 204, 21, 0.8); }
        }
        .rank-1-glow { animation: goldGlow 2.5s infinite, popIn 0.5s ease-out forwards; }
        
        /* Стилизация медалей (Топ-3 остается старым) */
        .rank-3 { box-shadow: 0 0 20px rgba(180, 83, 9, 0.3); border: 1px solid rgba(255, 255, 255, 0.15); border-left: 4px solid rgba(180, 83, 9, 0.8); }
        
        /* Текстовые тени для читаемости поверх любого видео */
        .text-outline {
            text-shadow: 0px 2px 8px rgba(0,0,0,0.9), 0px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="text-white h-screen flex flex-col justify-end">

    <!-- Основной контейнер виджета -->
    <div class="w-full max-w-2xl mx-auto pb-10">
        <!-- Заголовок -->
        <h1 id="titleText" class="text-3xl font-extrabold text-center mb-10 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-violet-400 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
            👑 ТОП СПОНСОРОВ 👑
        </h1>
        
        <!-- Контейнер для списка -->
        <div id="giftersList" class="flex flex-col gap-5">
            <!-- Элементы списка рендерятся тут -->
        </div>
        
        <div id="statusText" class="text-center text-sm font-bold tracking-widest mt-6 text-gray-400 text-outline"></div>
    </div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://zagvyrqnayxdbqkcjqud.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_glnqsWdFcmaHOzUrfD5fGA_dt6xiB1f';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentStreamer = '';
        let realtimeSubscription = null;

        const statusText = document.getElementById('statusText');
        const giftersContainer = document.getElementById('giftersList');

        // URL красивой 3D монетки
        const COIN_ICON_URL = 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Coin/3D/coin_3d.png';

        // Автозапуск при открытии ссылки
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user') || urlParams.get('username');

            if (username) {
                currentStreamer = username;
                statusText.innerText = `Подключение к @${username}...`;
                listenToSupabase();
            } else {
                statusText.innerText = '⚠️ ДОБАВЬТЕ ?user=имя_стримера В ССЫЛКУ';
            }
        });

        async function fetchAndRenderTop() {
            const { data, error } = await supabaseClient
                .from('top_gifters')
                .select('*')
                .eq('streamer_username', currentStreamer)
                .order('coins', { ascending: false })
                .limit(3);
            
            if (!error && data) {
                renderCards(data);
                if (data.length > 0) {
                    statusText.innerText = ''; // Очищаем статус, если загрузили данные
                }
            } else if (error) {
                statusText.innerText = `Ошибка БД: ${error.message}`;
            }
        }

        function listenToSupabase() {
            // Первичная загрузка
            fetchAndRenderTop();

            // Подписка на обновления таблицы в реальном времени
            realtimeSubscription = supabaseClient.channel('public:top_gifters')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'top_gifters',
                    filter: `streamer_username=eq.${currentStreamer}` 
                }, () => {
                    fetchAndRenderTop(); 
                })
                .subscribe();
        }

        function renderCards(gifters) {
            giftersContainer.innerHTML = '';
            
            // Заполняем пустыми местами до 3
            const displayGifters = [...gifters];
            while (displayGifters.length < 3) { displayGifters.push(null); }

            // Порядок для списка: 1, 2, 3
            const ranks = [1, 2, 3];
            
            displayGifters.forEach((gifter, index) => {
                const rank = ranks[index];
                
                if (!gifter) {
                    giftersContainer.innerHTML += `
                        <div class="glass-panel p-4 h-[88px] opacity-30 flex items-center justify-center text-gray-400 font-bold">
                            Ожидание...
                        </div>`;
                    return;
                }

                const name = gifter.gifter_nickname || gifter.gifter_username;
                const coinsStr = gifter.coins.toLocaleString();
                let cardHTML = '';

                // --- ТОП 1 (Король) ---
                if (rank === 1) {
                    cardHTML = `
                        <div class="glass-panel gifter-card relative flex items-center p-6 w-full rank-1-glow bg-gradient-to-r from-yellow-900/50 to-transparent border-2 border-yellow-400/80 mb-2 transform scale-105 origin-bottom">
                            
                            <!-- Корона (Абсолют) -->
                            <div class="absolute -top-6 -left-4 text-5xl drop-shadow-[0_0_12px_rgba(250,204,21,0.9)] z-20" style="transform: rotate(-15deg);">👑</div>

                            <!-- Место в топе -->
                            <div class="w-14 h-14 flex-shrink-0 flex items-center justify-center bg-gradient-to-br from-yellow-200 via-yellow-400 to-yellow-600 text-black text-2xl font-black rounded-full border-2 border-white shadow-[0_0_20px_rgba(250,204,21,1)] mr-5 z-10">
                                #1
                            </div>

                            <!-- Аватарка -->
                            <div class="relative flex-shrink-0 mr-5">
                                <img src="${gifter.avatar_url}" class="w-20 h-20 rounded-full border-4 border-yellow-400 object-cover shadow-[0_0_25px_rgba(250,204,21,0.7)]">
                            </div>
                            
                            <!-- Данные пользователя -->
                            <div class="flex-grow min-w-0 pr-4 text-left">
                                <h2 class="text-3xl font-black truncate text-white drop-shadow-lg text-outline">${name}</h2>
                                <p class="text-lg text-yellow-200/80 mt-1 truncate text-outline">@${gifter.gifter_username}</p>
                            </div>
                            
                            <!-- Блок с монетами ОГРОМНЫЙ -->
                            <div class="flex-shrink-0 inline-flex items-center gap-3 bg-black/80 px-6 py-3 rounded-2xl border border-yellow-500/50 shadow-[inset_0_0_20px_rgba(250,204,21,0.3)] ml-auto">
                                <span class="text-yellow-400 font-black text-6xl drop-shadow-[0_0_15px_rgba(250,204,21,1)] leading-none">${coinsStr}</span>
                                <img src="${COIN_ICON_URL}" class="w-14 h-14 drop-shadow-[0_0_10px_rgba(250,204,21,1)]" alt="coin">
                            </div>
                        </div>
                    `;
                } 
                // --- ТОП 2 (Серебро) ---
                else if (rank === 2) {
                    cardHTML = `
                        <div class="glass-panel gifter-card relative flex items-center p-5 w-full animate-pop bg-gradient-to-r from-gray-700/50 to-transparent border-2 border-gray-400/60 shadow-[0_0_20px_rgba(156,163,175,0.3)] mb-1">
                            
                            <!-- Место в топе -->
                            <div class="w-12 h-12 flex-shrink-0 flex items-center justify-center bg-gradient-to-br from-gray-100 via-gray-300 to-gray-500 text-gray-900 text-xl font-black rounded-full border-2 border-gray-100 shadow-[0_0_15px_rgba(209,213,219,0.8)] mr-4 z-10">
                                #2
                            </div>

                            <!-- Аватарка -->
                            <div class="relative flex-shrink-0 mr-4">
                                <img src="${gifter.avatar_url}" class="w-16 h-16 rounded-full border-[3px] border-gray-300 object-cover shadow-[0_0_15px_rgba(209,213,219,0.5)]">
                            </div>
                            
                            <!-- Данные пользователя -->
                            <div class="flex-grow min-w-0 pr-4 text-left">
                                <h2 class="text-2xl font-bold truncate text-gray-100 text-outline">${name}</h2>
                                <p class="text-base text-gray-400 mt-1 truncate text-outline">@${gifter.gifter_username}</p>
                            </div>
                            
                            <!-- Блок с монетами СРЕДНИЙ -->
                            <div class="flex-shrink-0 inline-flex items-center gap-2 bg-black/70 px-5 py-2.5 rounded-xl border border-gray-400/40 shadow-[inset_0_0_10px_rgba(209,213,219,0.1)] ml-auto">
                                <span class="text-gray-200 font-black text-4xl drop-shadow-[0_0_10px_rgba(209,213,219,0.8)] leading-none">${coinsStr}</span>
                                <img src="${COIN_ICON_URL}" class="w-10 h-10 drop-shadow-[0_0_8px_rgba(209,213,219,1)]" alt="coin">
                            </div>
                        </div>
                    `;
                } 
                // --- ТОП 3 (Оригинал, как и просили) ---
                else {
                    cardHTML = `
                        <div class="glass-panel gifter-card relative flex items-center p-4 w-full rank-3 animate-pop border border-white/15">
                            
                            <!-- Место в топе -->
                            <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center bg-gray-900 text-white font-black rounded-full border-2 border-gray-600 shadow-lg mr-4 text-outline z-10">
                                #3
                            </div>

                            <!-- Аватарка -->
                            <div class="relative flex-shrink-0 mr-4">
                                <img src="${gifter.avatar_url}" class="w-16 h-16 rounded-full border-2 border-gray-900 object-cover shadow-[0_0_10px_rgba(0,0,0,0.8)]">
                            </div>
                            
                            <!-- Данные пользователя -->
                            <div class="flex-grow min-w-0 pr-4 text-left">
                                <h2 class="text-xl font-bold truncate text-white text-outline">${name}</h2>
                                <p class="text-sm text-gray-300 mt-1 truncate text-outline">@${gifter.gifter_username}</p>
                            </div>
                            
                            <!-- Блок с монетами -->
                            <div class="flex-shrink-0 inline-flex items-center gap-2 bg-black/60 px-4 py-2 rounded-xl border border-white/10 shadow-inner ml-auto">
                                <span class="text-yellow-400 font-black text-2xl drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]">${coinsStr}</span>
                                <img src="${COIN_ICON_URL}" class="w-8 h-8 drop-shadow-[0_0_5px_rgba(250,204,21,1)]" alt="coin">
                            </div>
                        </div>
                    `;
                }

                giftersContainer.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
