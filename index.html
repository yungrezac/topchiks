<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топ-3 Дарителя - OBS Widget</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            /* Полностью прозрачный фон для OBS */
            background: transparent !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 20px;
        }
        .glass-panel {
            /* Темная полупрозрачная подложка, чтобы текст не сливался с игрой/видео */
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
        }
        .gifter-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Анимация появления */
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-pop { animation: popIn 0.5s ease-out forwards; }
        
        /* Стилизация медалей */
        .rank-1 { box-shadow: 0 0 25px rgba(250, 204, 21, 0.4); border: 2px solid rgba(250, 204, 21, 0.6); }
        .rank-2 { box-shadow: 0 0 20px rgba(156, 163, 175, 0.3); border: 2px solid rgba(156, 163, 175, 0.5); }
        .rank-3 { box-shadow: 0 0 20px rgba(180, 83, 9, 0.3); border: 2px solid rgba(180, 83, 9, 0.5); }
        
        /* Текстовые тени для читаемости поверх любого видео */
        .text-outline {
            text-shadow: 0px 2px 8px rgba(0,0,0,0.9), 0px 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="text-white h-screen flex flex-col justify-end">

    <!-- Основной контейнер виджета -->
    <div class="w-full max-w-4xl mx-auto pb-10">
        <!-- Убрали hidden и заменили text-outline на drop-shadow для совместимости с OBS -->
        <h1 id="titleText" class="text-3xl font-extrabold text-center mb-12 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-violet-400 filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
            👑 ТОП СПОНСОРОВ 👑
        </h1>
        
        <div id="giftersList" class="grid grid-cols-3 gap-6 items-end h-[350px]">
            <!-- Карточки рендерятся тут -->
        </div>
        
        <div id="statusText" class="text-center text-sm font-bold tracking-widest mt-4 text-gray-400 text-outline"></div>
    </div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://zagvyrqnayxdbqkcjqud.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_glnqsWdFcmaHOzUrfD5fGA_dt6xiB1f';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentStreamer = '';
        let realtimeSubscription = null;

        const statusText = document.getElementById('statusText');
        const giftersContainer = document.getElementById('giftersList');

        // Автозапуск при открытии ссылки
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user') || urlParams.get('username');

            if (username) {
                currentStreamer = username;
                statusText.innerText = `Подключение к @${username}...`;
                listenToSupabase();
            } else {
                statusText.innerText = '⚠️ ДОБАВЬТЕ ?user=имя_стримера В ССЫЛКУ';
            }
        });

        async function fetchAndRenderTop() {
            const { data, error } = await supabase
                .from('top_gifters')
                .select('*')
                .eq('streamer_username', currentStreamer)
                .order('coins', { ascending: false })
                .limit(3);
            
            if (!error && data) {
                renderCards(data);
                if (data.length > 0) {
                    statusText.innerText = ''; // Очищаем статус, если загрузили данные
                }
            } else if (error) {
                statusText.innerText = `Ошибка БД: ${error.message}`;
            }
        }

        function listenToSupabase() {
            // Первичная загрузка
            fetchAndRenderTop();

            // Подписка на обновления таблицы в реальном времени
            realtimeSubscription = supabase.channel('public:top_gifters')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'top_gifters',
                    filter: `streamer_username=eq.${currentStreamer}` 
                }, () => {
                    fetchAndRenderTop(); 
                })
                .subscribe();
        }

        function renderCards(gifters) {
            giftersContainer.innerHTML = '';
            
            // Заполняем пустыми местами до 3
            const displayGifters = [...gifters];
            while (displayGifters.length < 3) { displayGifters.push(null); }

            // Порядок для пьедестала: Слева(2), Центр(1), Справа(3)
            const podiumOrder = [displayGifters[1], displayGifters[0], displayGifters[2]];
            const ranks = [2, 1, 3];
            const heights = ['h-[240px]', 'h-[300px]', 'h-[210px]']; 
            
            podiumOrder.forEach((gifter, index) => {
                const rank = ranks[index];
                
                if (!gifter) {
                    giftersContainer.innerHTML += `<div class="glass-panel ${heights[index]} opacity-30 flex items-center justify-center text-gray-400 font-bold text-center">Ожидание...</div>`;
                    return;
                }

                const cardHTML = `
                    <div class="glass-panel gifter-card relative flex flex-col justify-end pb-6 ${heights[index]} rank-${rank} animate-pop">
                        <!-- Аватарка выходит за пределы карточки вверх -->
                        <div class="absolute -top-12 left-1/2 transform -translate-x-1/2">
                            <img src="${gifter.avatar_url}" class="w-24 h-24 rounded-full border-4 border-gray-900 object-cover shadow-[0_0_15px_rgba(0,0,0,0.8)]">
                            <div class="absolute -bottom-2 right-0 bg-gray-900 text-white text-sm font-black px-3 py-1 rounded-full border-2 border-gray-600 shadow-lg">
                                #${rank}
                            </div>
                        </div>
                        
                        <!-- Данные пользователя -->
                        <div class="text-center px-4 mt-8">
                            <h2 class="text-xl font-bold truncate text-white text-outline">${gifter.gifter_nickname || gifter.gifter_username}</h2>
                            <p class="text-xs text-gray-300 mt-1 truncate text-outline">@${gifter.gifter_username}</p>
                            
                            <!-- Блок с монетами -->
                            <div class="mt-4 inline-flex items-center gap-2 bg-black/60 px-4 py-2 rounded-xl border border-white/10 shadow-inner">
                                <span class="text-yellow-400 font-black text-2xl drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]">${gifter.coins.toLocaleString()}</span>
                                <svg class="w-6 h-6 text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,1)]" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 14a6 6 0 110-12 6 6 0 010 12z"/></svg>
                            </div>
                        </div>
                    </div>
                `;
                giftersContainer.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
